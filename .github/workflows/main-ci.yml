name: ci workflow

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  # Check what changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
              - '!frontend/dist/**'
              - '!frontend/node_modules/**'
            backend:
              - 'backend/**/*.go'
              - 'backend/go.mod'
              - 'backend/go.sum'
              - '.github/workflows/*backend*.yml'
      - name: Debug Output
        run: 'echo "Frontend changed: ${{ steps.filter.outputs.frontend }}"'

  call-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/test-and-lint-frontend.yml

  # Call the external Backend workflow
  call-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/test-and-lint-backend.yml

  all-checks-passed:
    runs-on: ubuntu-latest
    needs:
      - call-frontend
      - call-backend
    if: always()
    steps:
      - name: Check Results
        run: |
          if [[ "${{ needs.call-backend.result }}" == "failure" ]] || [[ "${{ needs.call-frontend.result }}" == "failure" ]]; then
            exit 1
          fi
