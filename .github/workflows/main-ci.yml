name: Main CI Orchestrator

on:
  pull_request:
    branches: [main]

jobs:
  # Check what changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      # frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend: 'frontend/**'
            backend: 'backend/**'

  # Call the external Backend workflow
  call-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/test-and-lint-backend.yml

  all-checks-passed:
    runs-on: ubuntu-latest
    needs:
      # - call-frontend
      - call-backend
    if: always()
    steps:
      - name: Check Results
        run: |
          if [[ "${{ needs.call-backend.result }}" == "failure" ]]; then
            exit 1
          fi
