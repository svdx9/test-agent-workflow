name: Test

on:
  pull_request:
    paths:
      - "backend/**/*.go"
      - "backend/go.mod"
      - "backend/go.sum"
      - ".github/workflows/test.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**/*.go"
      - "backend/go.mod"
      - "backend/go.sum"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
          cache: true

      - name: Run tests
        run: go test ./...
        working-directory: backend
